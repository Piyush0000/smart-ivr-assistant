<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GovVoice AI | Smart Citizen Helpline</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <header>
            <h1>GovVoice AI</h1>
            <p style="color: #94a3b8; font-size: 0.9rem; margin-top: 0.5rem; text-align: center;">Smart Government Assistance</p>
        </header>

        <div class="status-badge" id="status-badge">
            <span class="status-dot"></span>
            <span id="status-text">Ready to help</span>
        </div>

        <div class="mic-section">
            <button id="mic-btn">
                <i data-lucide="mic"></i>
            </button>
            <div class="glow-ring"></div>
        </div>

        <div class="chat-bubble" id="chat-container">
            <!-- Messages will appear here -->
        </div>

        <audio id="audio-player" style="display: none;"></audio>
    </div>

    <script src="script.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
